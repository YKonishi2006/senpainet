  /* ===== Loading splash ===== */
  #splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;

    transition:opacity .55s ease, transform .55s ease}

  .sp-inner{display:flex;flex-direction:column;align-items:center;text-align:center;padding:20px}
  .sp-logowrap{position:relative;width:112px;height:112px;display:flex;align-items:center;justify-content:center;margin-bottom:22px}
  .sp-glow{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 50% 45%,rgba(37,99,235,.22),rgba(37,99,235,0) 68%);
    animation:sp-pulse 1.8s ease-in-out infinite}
  .sp-logo{position:relative;width:88px;height:88px}
  .sp-cap{transform-origin:50% 50%;animation:sp-pop .8s cubic-bezier(.2,1.3,.4,1) both}
  .sp-band{stroke-dasharray:82;stroke-dashoffset:82;animation:sp-draw .7s .45s ease forwards}
  .sp-tassel{opacity:0;animation:sp-fade .4s .9s ease forwards}
  .sp-orbit{position:absolute;inset:0;animation:sp-orbit 2.4s linear infinite}
  .sp-orbit i{position:absolute;top:-3px;left:50%;width:10px;height:10px;margin-left:-5px;border-radius:50%;
    background:#0ea5e9;box-shadow:0 0 10px rgba(14,165,233,.7)}
  .sp-word{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:30px;letter-spacing:-.02em;color:#1b2942;
    opacity:0;animation:sp-up .6s .55s ease forwards}

  @media (prefers-reduced-motion:reduce){
    .sp-cap,.sp-band,.sp-tassel,.sp-orbit,.sp-word,.sp-tag,.sp-bar,.sp-glow{animation-duration:.01s !important;animation-delay:0s !important}

</style>

<script>
(function(){

/* ============ CATEGORY DEFINITIONS ============ */
var cats = {
  shinro:  { label: '進路・受験',    color: '#0ea5a9', bg: '#e1f6f7' },
  benkyo:  { label: '勉強・学習',    color: '#1e9e63', bg: '#e7f5ee' },

  bukatsu: { label: '部活・課外活動', color: '#e0892a', bg: '#fbefe0' },
  ningen:  { label: '人間関係',      color: '#e0568a', bg: '#fde8f0' },
  career:  { label: '将来・キャリア', color: '#5b6ef0', bg: '#ebedfe' },
  other:   { label: 'その他',        color: '#6b7280', bg: '#eef1f6' }
};

/* ============ SCHOOL / 回生 ENGINE ============ */
// 単一校（中高一貫・6年制）向け。20回生が2026年度に中1（1年生）。
// 学年と「在校生／卒業生」は現在の年度から自動計算され、毎年度くり上がる（＝毎年更新）。
var SCHOOL = { name: '〇〇中学・高等学校', baseKaisei: 20, baseYear: 2026 };
var GRADE_LABELS = { 1:'中1', 2:'中2', 3:'中3', 4:'高1', 5:'高2', 6:'高3' };
// 年度（4月始まり）。3月までは前年度扱い。
function schoolYear(d){ d = d || new Date(); return d.getMonth() >= 3 ? d.getFullYear() : d.getFullYear() - 1; }
// baseYear年度に baseKaisei回生 が1年生（中1）。回生が小さいほど上級生。
function gradeOf(kaisei, y){ if(y==null) y = schoolYear(); return 1 + (SCHOOL.baseKaisei - kaisei) + (y - SCHOOL.baseYear); }
function statusOf(kaisei, y){
  var g = gradeOf(kaisei, y);
  if(g < 1)  return { type:'future', grade:g };
  if(g <= 6) return { type:'current', grade:g, gradeLabel:GRADE_LABELS[g] };
  return { type:'grad', grade:g, years:g - 6 };
}
// 表示名: 在校生→「18回生（中3）」, 卒業生→「14回生（卒業生）」
function personName(kaisei, y){
  var s = statusOf(kaisei, y);
  if(s.type==='current') return kaisei + '回生（' + s.gradeLabel + '）';
  if(s.type==='grad')    return kaisei + '回生（卒業生）';
  return kaisei + '回生';
}
// サブ情報: 卒業生→「卒業N年目」, 在校生→学年ラベル
function personMeta(kaisei, y){
  var s = statusOf(kaisei, y);
  if(s.type==='grad')    return '卒業' + s.years + '年目';
  if(s.type==='current') return s.gradeLabel;
  return '';
}
// バッジ: 在校生／卒業生 を色分け
function personBadge(kaisei, y){
  var s = statusOf(kaisei, y);
  if(s.type==='grad') return { label:'卒業生', color:'#1f5fd0', bg:'#e8f1fe' };
  return { label:'在校生', color:'#0ea5a9', bg:'#d9f3ee' };
}
// 今年度に中1（1年生）の回生、学年→回生の逆算
function currentChu1Kaisei(){ return SCHOOL.baseKaisei + (schoolYear() - SCHOOL.baseYear); }
function kaiseiFromGrade(g){ return currentChu1Kaisei() - (g - 1); }

/* ============ STATE ============ */
var state = {
  screen: 'home', query: '', activeCat: 'all', activeGrade: 'all', selectedId: 'oc_univ',
  pstep: 1, pcat: '', ptitle: '', pbody: '', pMoreOpen: false, pContext: '',
  answering: false, answerText: '', answerAnon: false,
  browseSort: 'new', browseLimit: 4, answerSort: 'new',

  communityGroup: null, communityText: '',
  communityFilter: 'all', communityFeedTab: 'all', communitySort: 'popular', followedUsers: {},

    { id:'o2', kind:'event', kaisei:13, univ:'京都大学', title:'夏休みオンライン進路相談会を開催します', body:'現役大学生の先輩に、大学生活や受験について何でも聞ける会です。学年問わず参加OK。', deadline:'8月10日', responses:41, responded:false, time:'1日前' },
    { id:'o3', kind:'briefing', kaisei:11, univ:'東京大学', title:'理系学部のリアルを話す座談会', body:'理系に興味がある在校生向けに、学部の違いや研究のことを話します。中学生も歓迎！', deadline:'7月20日', responses:33, responded:false, time:'3時間前' },
    { id:'o4', kind:'intern', kaisei:14, univ:'大阪大学', title:'母校の文化祭ボランティアを募集', body:'今年の文化祭を、卒業生としてお手伝いしてくれる人を探しています。当日運営のサポートです。', deadline:'9月15日', responses:12, responded:false, time:'2日前' }
  ],
  communityPosts: [
    { id:'cp1', group:'shukatsu', category:'shukatsu', title:'サマーインターン、何社応募しましたか？', kaisei:14, univ:'早稲田大学', body:'そろそろサマーインターンの応募が始まりますね！みなさんはどのくらいの企業に応募する予定ですか？業界や職種もぜひ教えてください！', likes:87, liked:false, replies:22, time:'3時間前', bookmarked:false },

// ホーム実績を実データから自動集計（投稿・回答が増えるたびに反映）
function computeStats(){
  var cs = state.consultations;
  var total = cs.length;
  var answered = cs.filter(function(c){ return c.answers.length > 0; }).length;
  var rate = total ? Math.round(answered / total * 100) : 0;
  var replied = cs.filter(function(c){ return c.firstReplyHours != null; });
  var avg = replied.length ? replied.reduce(function(s,c){ return s + c.firstReplyHours; }, 0) / replied.length : 0;
  // 回答に参加した先輩（回生）のユニーク数 ＋ ログイン中ユーザー
  var set = {};
  cs.forEach(function(c){ c.answers.forEach(function(a){ if(a.kaisei != null) set[a.kaisei] = 1; }); });
  set[state.userKaisei] = 1;
  var senpai = Object.keys(set).length;
  return { total: total, rate: rate, avgHours: avg, senpai: senpai };
}

// Convert a relative-time label ("30分前" / "2時間前" / "1日前" / "たった今") to
// minutes-ago, so "新しい順" can sort by recency. Smaller = newer.
function timeRank(str){
  if(!str) return 1e9;
  if(str.indexOf('たった今')!==-1) return 0;
  var m = str.match(/(\d+)/); var n = m? parseInt(m[1],10) : 0;
  if(str.indexOf('日')!==-1) return n*1440;
  if(str.indexOf('時間')!==-1) return n*60;
  if(str.indexOf('分')!==-1) return n;
  return 1e9;
}

/* ---- Toast ---- */
function toast(msg){
  var root = document.getElementById('toast-root');
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'pointer-events:auto;background:#1b2942;color:#fff;font-size:13.5px;font-weight:700;padding:12px 20px;border-radius:10px;box-shadow:0 8px 24px rgba(15,23,42,.28);opacity:0;transform:translateY(8px);transition:opacity .2s,transform .2s';
  root.appendChild(t);
  requestAnimationFrame(function(){ t.style.opacity='1'; t.style.transform='translateY(0)'; });
  setTimeout(function(){ t.style.opacity='0'; t.style.transform='translateY(8px)'; setTimeout(function(){ if(t.parentNode) t.parentNode.removeChild(t); }, 220); }, 2200);
}

function openModal(innerHTML, maxw){
  var r = document.getElementById('modal-root');
  r.innerHTML = '<div data-modal-overlay style="position:fixed;inset:0;z-index:150;background:rgba(15,23,42,.42);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:24px">'
    + '<div style="background:#fff;border-radius:12px;max-width:'+(maxw||440)+'px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 24px 60px rgba(15,23,42,.3)">'
    + '<div style="position:relative">'
    + '<button data-modal-close style="position:absolute;top:14px;right:14px;border:none;background:#eef3fb;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#3a465f"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>'
    + innerHTML
    + '</div></div></div>';
  // wire close + any modal-scoped actions
  r.querySelector('[data-modal-close]').addEventListener('click', closeModal);
  r.querySelector('[data-modal-overlay]').addEventListener('click', function(e){ if(e.target===this) closeModal(); });
  var cancelBtn = r.querySelector('[data-modal-close-btn]');
  if(cancelBtn) cancelBtn.addEventListener('click', closeModal);
  var form = r.querySelector('form[data-modal-form]');
  if(form){ form.addEventListener('submit', function(e){ e.preventDefault(); handleModalForm(form.getAttribute('data-modal-form'), form); }); }
}

/* ---- Modal form submit handler ---- */
// Read fields via querySelector — `form.name` resolves to the form's own name
// property (a string), not the <input name="name">, so named access is unsafe.
function fieldVal(form, n){ var el = form.querySelector('[name="'+n+'"]'); return el ? el.value.trim() : ''; }
// 新規登録後のセットアップを開始
function startSetup(nick){
  state.loggedIn = true;
  state.setupStatus = null; state.setupGrade = null; state.setupGradKaisei = kaiseiFromGrade(6) - 1;
  state.setupUniv = ''; state.setupFaculty = ''; state.setupNick = nick || '';
  go('setup');
}
// セットアップ完了 → プロフィールを確定
function completeSetup(){
  if(state.setupStatus==='current'){
    if(!state.setupGrade){ toast('学年を選んでください'); return; }
    state.userKaisei = kaiseiFromGrade(state.setupGrade);
    state.userUniv = ''; state.userFaculty = '';
  } else if(state.setupStatus==='grad'){
    state.userKaisei = state.setupGradKaisei || (kaiseiFromGrade(6)-1);
    state.userUniv = (state.setupUniv||'').trim();
    state.userFaculty = (state.setupFaculty||'').trim();
  } else {
    toast('在校生・卒業生を選んでください'); return;
  }
  var nick = (state.setupNick||'').trim();
  state.userName = nick || (statusOf(state.userKaisei).type==='grad' ? '卒業生ユーザー' : '在校生ユーザー');
  go('mypage'); toast('プロフィールを作成しました');
}
function handleModalForm(kind, form){
  if(kind==='login'){
    state.loggedIn = true;
    closeModal(); toast('ログインしました'); go('mypage');
  } else if(kind==='signup'){
    var nick = fieldVal(form,'nick');
    closeModal(); toast('登録が完了しました'); startSetup(nick);
  } else if(kind==='profile'){
    var name = fieldVal(form,'name');
    if(name) state.userName = name;
    closeModal(); toast('プロフィールを更新しました'); render();
  } else if(kind==='qapost'){
    var qcat = fieldVal(form,'cat')||'shukatsu', qtitle = fieldVal(form,'title'), qbody = fieldVal(form,'body');
    if(!qtitle || !qbody) return;
    state.communityPosts.unshift({ id:'cp_'+Date.now(), group:qcat, category:qcat, title:qtitle, kaisei:state.userKaisei, univ:state.userUniv||'', body:qbody, likes:0, liked:false, replies:0, time:'たった今', you:true, bookmarked:false });
    state.qaCat='all'; state.qaStatus='all';
    closeModal(); toast('相談を投稿しました'); go('qa');
  } else if(kind==='outreach'){
    var title = fieldVal(form,'title'), body = fieldVal(form,'body');
    if(!title || !body) return;
    state.outreachPosts.unshift({ id:'o_'+Date.now(), kind:fieldVal(form,'kind')||'other', kaisei:state.userKaisei, univ:state.userUniv||'', title:title, body:body, deadline:fieldVal(form,'deadline'), responses:0, responded:false, time:'たった今', you:true });
    state.outreachFilter = 'all';
    closeModal(); toast('在校生に発信しました'); go('outreach');
  }
}

function go(s){ state.screen = s; state.menuOpen = false; if(s==='mypage') state.mypageTab = 'overview'; if(s==='community') state.communityGroup = null; render(); toTop(); }
function goSupport(section){
  state.screen = 'support'; state.menuOpen = false; render();
  if(section){ var el = document.getElementById('support-' + section); if(el){ el.scrollIntoView(); return; } }
  toTop();
}
function openDetail(id){ state.screen='detail'; state.selectedId=id; state.answering=false; state.answerText=''; render(); toTop(); }
function toggleLike(id){ var c=find(id); if(!c) return; c.liked=!c.liked; c.likes += c.liked?1:-1; render(); }
function toggleBookmark(id){ var c=find(id); if(!c) return; c.bookmarked=!c.bookmarked; render(); }
function toggleHelpful(a){ a.marked=!a.marked; a.helpful += a.marked?1:-1; render(); }
function confirmPost(){ if(state.pcat && state.ptitle.trim() && state.pbody.trim()){ state.pstep=2; render(); toTop(); } }
function submitAnswer(){
  var c=selectedC(); var t=state.answerText.trim();
  if(!c||!t) return;
  var wasEmpty = c.answers.length === 0;
  c.answers.unshift({ kaisei:state.userKaisei, time:'たった今', body:t, helpful:0, marked:false, you:true, anon:!!state.answerAnon });
  c.nAnswers += 1;
  // Firestore に保存（全員に共有）。未設定/失敗時はローカルのみ。
  if(window.snDb && window.snDb.addAnswer) window.snDb.addAnswer(c.id, { kaisei:state.userKaisei, time:'たった今', body:t, helpful:0, anon:!!state.answerAnon, createdAt:Date.now() });
  // 初回回答なら「返信までの時間」を記録（→ 回答率・平均返信時間に反映）
  if(wasEmpty && c.firstReplyHours == null){
    var hrs = (Date.now() - (c.postedAt || Date.now())) / 3600000;
    c.firstReplyHours = Math.max(0.1, Math.round(hrs * 10) / 10);
  }
  state.answering=false; state.answerText=''; state.answerAnon=false;
  render(); toast('回答を投稿しました');
}
// 投稿完了時に実際の相談として追加（→ 相談件数・回答率が順次反映）
function addUserConsultation(){
  var g = Math.max(1, Math.min(6, gradeOf(state.userKaisei)));
  var id = 'u_'+Date.now();
  var bodyText = state.pbody.trim();
  if(state.pContext && state.pContext.trim()) bodyText += '\n\n【状況】' + state.pContext.trim();
  state.consultations.unshift({
    id:id, grade:g, category:state.pcat, popular:false,
    title:state.ptitle.trim(), body:bodyText,
    likes:0, nAnswers:0, time:'たった今', views:0,
    liked:false, bookmarked:false, firstReplyHours:null, postedAt:Date.now(),
    answers:[]
  });
  // cid でマイページの「自分の相談」から相談ページを開けるようにする
  state.myPosts.unshift({ cid:id, category:state.pcat, title:state.ptitle.trim(), nAnswers:0, time:'たった今', status:'回答受付中' });
  // Firestore に保存（全員に反映）。未設定/失敗時はローカルのみ。
  if(window.snDb && window.snDb.addConsultation) window.snDb.addConsultation(state.consultations[0]);
}
function findCommunityPost(id){ for(var i=0;i<state.communityPosts.length;i++){ if(state.communityPosts[i].id===id) return state.communityPosts[i]; } return null; }
function findOutreach(id){ for(var i=0;i<state.outreachPosts.length;i++){ if(state.outreachPosts[i].id===id) return state.outreachPosts[i]; } return null; }
function findById(arr, id){ for(var i=0;i<arr.length;i++){ if(arr[i].id===id) return arr[i]; } return null; }
function submitCommunityPost(){
  if(statusOf(state.userKaisei).type!=='grad'){ toast('投稿できるのは卒業生のみです'); return; }

}

/* ============ BROWSE ============ */
function browseFiltered(){
  var q = state.query.trim();
  var list = state.consultations.filter(function(c){
    if(c.hidden) return false; // 運営が非表示にした相談は公開一覧から除外
    var catOk = state.activeCat==='all' || c.category===state.activeCat;
    // grade filter uses the asker's grade AT POSTING (frozen — does not shift year to year)
    var gradeOk = state.activeGrade==='all' || c.grade===state.activeGrade;
    var qOk = q==='' || (c.title+c.body).indexOf(q)!==-1;
    return catOk && gradeOk && qOk;
  });
  if(state.browseSort==='popular') list = list.slice().sort(function(a,b){ return b.likes - a.likes; });
  else list = list.slice().sort(function(a,b){ return timeRank(a.time) - timeRank(b.time); });
  return list;
}

function browseListHTML(){
  var full = browseFiltered();

    return '<div style="text-align:center;padding:60px 0;color:#94a1b5;font-size:14px">該当する相談が見つかりませんでした。</div>';

  return list.map(function(c){
    var m=cats[c.category];
    var likeColor=c.liked?'#e0568a':'#94a1b5';
    var bmColor=c.bookmarked?'#2f73e8':'#bcc6d6';

      + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:'+m.color+'"><span style="width:16px;height:16px;border-radius:5px;background:'+m.bg+';display:inline-flex;align-items:center;justify-content:center"><span style="width:6px;height:6px;border-radius:2px;background:'+m.color+'"></span></span>'+m.label+'</span>'
      + '<span style="font-size:11px;font-weight:700;color:#0ea5a9;background:#d9f3ee;padding:2px 9px;border-radius:10px">'+GRADE_LABELS[c.grade]+'の相談</span></div>'
      + '<div style="font-size:17px;font-weight:700;color:#1b2942;margin:10px 0 7px">'+esc(c.title)+'</div>'
      + '<div style="font-size:13.5px;color:#5a6678;line-height:1.75">'+esc(c.body)+'</div>'
      + '<div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px">'
      + '<div style="display:flex;align-items:center;gap:18px;font-size:13px;color:#94a1b5">'
      + '<button data-like="'+c.id+'" style="border:none;background:none;cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:6px;color:'+likeColor+';font-size:13px">'+heart(16)+c.likes+'</button>'
      + '<span style="display:inline-flex;align-items:center;gap:6px">'+chat(16)+c.nAnswers+'</span>'
      + '<span>'+c.time+'</span></div>'
      + '<button data-bookmark="'+c.id+'" style="border:none;background:none;cursor:pointer;padding:0">'+bookmark(17,20,bmFill,bmColor)+'</button>'
      + '</div></div>';
  }).join('');

  var posts = state.myPosts.length, ans = 0, helpful = 0;
  state.consultations.forEach(function(c){ c.answers.forEach(function(a){ if(a.you){ ans++; helpful += a.helpful; } }); });
  return { posts: posts, answers: ans, helpful: helpful };
}

function cmFeedFiltered(){
  var list = state.communityPosts.slice();
  if(state.communityFilter!=='all') list = list.filter(function(p){ return p.category===state.communityFilter; });
  var feedTab = state.communityFeedTab || 'all';
  if(feedTab==='following'){
    var followedKaisei = {};
    state.communityUsers.forEach(function(u){ if(state.followedUsers[u.id]) followedKaisei[u.kaisei]=1; });
    list = list.filter(function(p){ return followedKaisei[p.kaisei]; });
  }
  if(state.communitySort==='new') list.sort(function(a,b){ return timeRank(a.time)-timeRank(b.time); });
  else list.sort(function(a,b){ return b.likes-a.likes; });
  return list;
}

function admLineChart(){
  var s1 = [210,280,300,222,258,320,272];
  var s2 = [120,190,150,150,128,235,200];
  var labels = ['5/12','5/13','5/14','5/15','5/16','5/17','5/18'];
  var W=640,H=250,x0=54,x1=616,yTop=24,yBot=200;
  function yv(v){ return yBot - (v/400)*(yBot-yTop); }
  function xi(i){ return x0 + i*((x1-x0)/6); }
  var grid='';
  [0,100,200,300,400].forEach(function(g){ var y=yv(g); grid += '<line x1="'+x0+'" y1="'+y+'" x2="'+x1+'" y2="'+y+'" stroke="#e8edf5"/><text x="'+(x0-10)+'" y="'+(y+4)+'" text-anchor="end" font-size="11" fill="#94a1b5">'+g+'</text>'; });

  function poly(arr,color){ var pts=arr.map(function(v,i){ return xi(i)+','+yv(v); }).join(' '); var dots=arr.map(function(v,i){ return '<circle cx="'+xi(i)+'" cy="'+yv(v)+'" r="3.5" fill="#fff" stroke="'+color+'" stroke-width="2"/>'; }).join(''); return '<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>'+dots; }

// スクロールで表示領域に入った .reveal 要素をふわっと出す
var _revObserver = null;
function observeReveals(){
  var els = document.querySelectorAll('.reveal:not(.reveal-in)');
  if(typeof IntersectionObserver === 'undefined'){ els.forEach(function(el){ el.classList.add('reveal-in'); }); return; }
  if(!_revObserver){
    _revObserver = new IntersectionObserver(function(entries){
      entries.forEach(function(en){ if(en.isIntersecting){ en.target.classList.add('reveal-in'); _revObserver.unobserve(en.target); } });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
  }
  els.forEach(function(el){ _revObserver.observe(el); });
}
function render(){
  var app = document.getElementById('app');

  } else {
    app.innerHTML = '<div style="min-height:100vh;background:#f4f8ff">' + headerHTML() + screenHTML() + '</div>' + fabHTML();
  }
  wire();
  observeReveals();
}

    function closeMenu(){ if(state.menuOpen){ state.menuOpen = false; render(); } }

    if(t.hasAttribute('data-menu')){ state.menuOpen = !state.menuOpen; render(); return; }
    if(t.hasAttribute('data-nav')) return go(t.getAttribute('data-nav'));
    if(t.hasAttribute('data-open')) return openDetail(t.getAttribute('data-open'));
    if(t.hasAttribute('data-like')) return toggleLike(t.getAttribute('data-like'));
    if(t.hasAttribute('data-bookmark')) return toggleBookmark(t.getAttribute('data-bookmark'));
    if(t.hasAttribute('data-helpful')){ var c=selectedC(); if(c){ var a=c.answers[+t.getAttribute('data-helpful')]; if(a) toggleHelpful(a); } return; }
    if(t.hasAttribute('data-chip')){ state.activeCat = t.getAttribute('data-chip'); state.browseLimit = 4; render(); return; }

      // デモ: 実際のGoogle認証（Google Identity Services）はバックエンドとOAuthクライアントIDが必要。
      // ここではログイン成功として扱う。
      var wasSignup = t.getAttribute('data-google')==='signup';
      closeMenu(); closeModal();

    if(t.hasAttribute('data-info')){ closeMenu(); return infoModal(t.getAttribute('data-info')); }
    if(t.hasAttribute('data-support')) return goSupport(t.getAttribute('data-support'));
    if(t.hasAttribute('data-legal')){ closeMenu(); return go(t.getAttribute('data-legal')); }
    if(t.hasAttribute('data-mytab')){ state.mypageTab = t.getAttribute('data-mytab'); render(); toTop(); return; }

    if(t.hasAttribute('data-admin-tab')){ state.adminTab = t.getAttribute('data-admin-tab'); render(); toTop(); return; }

    if(t.hasAttribute('data-admin-user')){ var au=findById(state.adminUsers, t.getAttribute('data-admin-user')); if(au){ au.status=au.status==='suspended'?'active':'suspended'; render(); toast(au.status==='suspended'?'ユーザーを利用停止にしました':'利用停止を解除しました'); } return; }
    if(t.hasAttribute('data-admin-news-del')){ var nid=t.getAttribute('data-admin-news-del'); state.newsItems=state.newsItems.filter(function(n){ return n.id!==nid; }); render(); toast('お知らせを削除しました'); return; }
    if(t.hasAttribute('data-admin-sn-del')){ var sid=t.getAttribute('data-admin-sn-del'); state.senpaiNews=state.senpaiNews.filter(function(n){ return n.id!==sid; }); render(); toast('先輩のお知らせを削除しました'); return; }
    if(t.hasAttribute('data-admin-report-resolve')){ var rr=findById(state.adminReports, t.getAttribute('data-admin-report-resolve')); if(rr){ rr.status='resolved'; render(); toast('対応済みにしました'); } return; }
    if(t.hasAttribute('data-admin-report-del')){ var rid=t.getAttribute('data-admin-report-del'); state.adminReports=state.adminReports.filter(function(r){ return r.id!==rid; }); render(); toast('通報を削除しました'); return; }
  });
}

function wire(){
  // Per-render listeners below target fresh elements (innerHTML was replaced),
  // so old listeners are discarded with their nodes — safe to re-add each render.

  // Browse search (live filter, preserve focus)
  on('search-input','input', function(e){
    state.query = e.target.value;
    state.browseLimit = 4;
    var list = document.getElementById('browse-list');
    if(list) list.innerHTML = browseListHTML();
    var more = document.getElementById('browse-more');
    if(more) more.outerHTML = browseMoreHTML();
  });

  // Post form — update silently to keep caret position
  on('p-cat','change', function(e){
    state.pcat = e.target.value;
    var btn = document.getElementById('confirm-post');
    if(btn) btn.style.background = postValid()?'#2f73e8':'#b6cdf3';
  });
  on('p-title','input', function(e){
    state.ptitle = e.target.value.slice(0,30);
    if(e.target.value.length>30) e.target.value = state.ptitle;
    var c=document.getElementById('title-count'); if(c) c.textContent = state.ptitle.length;
    var btn=document.getElementById('confirm-post'); if(btn) btn.style.background = postValid()?'#2f73e8':'#b6cdf3';
  });
  on('p-body','input', function(e){
    state.pbody = e.target.value.slice(0,1000);
    if(e.target.value.length>1000) e.target.value = state.pbody;
    var c=document.getElementById('body-count'); if(c) c.textContent = state.pbody.length;
    var btn=document.getElementById('confirm-post'); if(btn) btn.style.background = postValid()?'#2f73e8':'#b6cdf3';
  });
  on('p-context','input', function(e){ state.pContext = e.target.value; });
  on('confirm-post','click', confirmPost);
  on('back-step','click', function(){ state.pstep=1; render(); toTop(); });
  on('submit-post','click', function(){ addUserConsultation(); state.pstep=3; render(); toTop(); });

  // マイページ プロフィール設定 保存
  on('mp-save','click', function(){
    var nm = document.getElementById('mp-name'), kk = document.getElementById('mp-kaisei');
    if(nm && nm.value.trim()) state.userName = nm.value.trim();
    if(kk) state.userKaisei = parseInt(kk.value, 10);
    render(); toast('プロフィールを更新しました');
  });

  // Setup (new-user profile) — text inputs update state silently to keep focus
  on('setup-univ','input', function(e){ state.setupUniv = e.target.value; });
  on('setup-faculty','input', function(e){ state.setupFaculty = e.target.value; });
  on('setup-nick','input', function(e){ state.setupNick = e.target.value; });
  on('setup-gradyear','change', function(e){ state.setupGradKaisei = parseInt(e.target.value, 10); });

  // Community composer
  on('community-text','input', function(e){ state.communityText = e.target.value; });

  // みんなの相談: live search + filter selects
  on('qa-search','input', function(e){ state.query = e.target.value; var l=document.getElementById('qa-list'); if(l) l.innerHTML = browseNewListHTML(); });
  on('qa-status-sel','change', function(e){ state.browseStatus = e.target.value; render(); });
  on('qa-sort-sel','change', function(e){ state.browseSort = e.target.value; render(); });
  on('qa-grade-sel','change', function(e){ var v=e.target.value; state.activeGrade = v==='all'?'all':parseInt(v,10); render(); });

  // Support contact form
  on('sp-send','click', function(){
    var msg = document.getElementById('sp-msg');
    if(!msg || !msg.value.trim()){ toast('お問い合わせ内容をご入力ください'); if(msg) msg.focus(); return; }
    document.getElementById('sp-msg').value = '';
    var em = document.getElementById('sp-email'); if(em) em.value = '';
    toast('お問い合わせを送信しました。ありがとうございます。');
  });
  function resetPost(){ state.pstep=1; state.pcat=''; state.ptitle=''; state.pbody=''; state.pContext=''; state.pMoreOpen=false; }
  on('browse-reset','click', function(){ resetPost(); go('browse'); });
  on('mypage-reset','click', function(){ resetPost(); go('mypage'); });
  on('home-reset','click', function(){ resetPost(); go('home'); });

  // Detail answer
  on('open-answer','click', function(){ state.answering=true; render(); });
  on('cancel-answer','click', function(){ state.answering=false; state.answerText=''; render(); });
  on('answer-text','input', function(e){ state.answerText = e.target.value; });
  on('submit-answer','click', submitAnswer);
}
function postValid(){ return !!(state.pcat && state.ptitle.trim() && state.pbody.trim()); }

/* ============ BOOT ============ */
// 既知の画面へは #hash で直接アクセスできる（例: #admin で運営コンソール）
var KNOWN_SCREENS = { home:1, news:1, community:1, outreach:1, browse:1, post:1, alumni:1, howto:1, mypage:1, support:1, terms:1, privacy:1, about:1, admin:1 };
function applyHash(){ var h=(location.hash||'').replace(/^#/,''); if(KNOWN_SCREENS[h]){ state.screen=h; if(h==='admin') state.adminTab='dashboard'; } }
applyHash();
window.addEventListener('hashchange', function(){ applyHash(); render(); toTop(); });

// Firebase Auth のコールバック（別の <script type="module"> から呼ばれる）
window.snOnAuthChange = function(user, authorized, configured){
  state.authUser = user || null;
  state.adminAuthorized = !!authorized;
  state.authConfigured = configured !== false;
  state.authReady = true;
  if(state.screen === 'admin') render();
};
window.snAuthError = function(msg){ toast('ログインに失敗しました'); };
// Firestore から相談一覧を受け取って差し替え（起動直後に一度）
window.snOnConsultations = function(list){
  if(!list || !list.length) return;
  state.consultations = list;
  render();
};
// Firebase モジュールが読み込めない/未設定でも管理画面が固まらないようにする保険
setTimeout(function(){ if(!state.authReady){ state.authReady = true; state.authConfigured = false; if(state.screen === 'admin') render(); } }, 3500);

setupDelegation();
render();

})();

<!-- ============================================================
     Firebase 認証（Googleログイン＋招待制の許可リスト）
     管理コンソール（#admin）を、招待された運営メンバーだけに限定します。

     ▼ セットアップ手順（一度だけ）
       1. https://console.firebase.google.com でプロジェクトを作成
       2. Authentication → Sign-in method で「Google」を有効化
       3. Authentication → Settings → 承認済みドメイン に
          「ykonishi2006.github.io」（と、ローカル確認用に「localhost」）を追加
       4. プロジェクトの設定 → マイアプリ（ウェブ）の firebaseConfig を下の
          firebaseConfig に貼り付け（apiKey 等は公開されても問題ない値です）
       5. 下の ADMIN_EMAILS に、閲覧を許可する運営メンバーの Gmail を追加
          （任意：Firestore の admins/{email} に {allowed:true} でも可）

     ※注意：これは「UIのゲート＋本人確認」です。本アプリの管理データは
       すべてクライアント側のデモデータのため、これ自体は完全なアクセス制御
       ではありません。実データを守るには Firestore にデータを置き、
       セキュリティルールで admins のみ許可する構成が必要です。
     ============================================================ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, collectionGroup, getDocs, setDoc, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  // Firebase プロジェクト senpainet-console の Web 設定（公開されても問題ない値）
  const firebaseConfig = {
    apiKey: "AIzaSyDdoErF92Zk4tqZ9ELDFe8EYNzh6BRXcmo",
    authDomain: "senpainet-console.firebaseapp.com",
    projectId: "senpainet-console",
    storageBucket: "senpainet-console.firebasestorage.app",
    messagingSenderId: "898586525680",
    appId: "1:898586525680:web:66416de3cecd569739a735"
  };
  // ▼ 閲覧を許可する運営メンバー（招待した人）のメールを追加
  const ADMIN_EMAILS = ["senpainet.iss@gmail.com"];

  const unconfigured = !firebaseConfig.apiKey || firebaseConfig.apiKey.indexOf("REPLACE") === 0;

  if (unconfigured) {
    // 未設定：デモ表示（誰でも閲覧可）。設定するとゲートが有効になります。
    if (window.snOnAuthChange) window.snOnAuthChange(null, false, false);
  } else {
    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);
      const provider = new GoogleAuthProvider();
      try { await setPersistence(auth, browserLocalPersistence); } catch (e) {}

      window.snAuthApi = {
        signIn: async () => { try { await signInWithPopup(auth, provider); } catch (e) { if (window.snAuthError) window.snAuthError(e && e.message ? e.message : String(e)); } },
        signOut: async () => { try { await signOut(auth); } catch (e) {} }
      };

      // ---- Firestore データ層（相談 consultations）----
      // 公開サイトは Firestore から相談を読み込み、投稿は書き込み、
      // 運営の非表示/削除は Firestore に反映（＝全員に反映される本物の管理）。
      window.snDb = {
        addConsultation: async (o) => {
          try { const d = Object.assign({}, o); delete d.liked; delete d.bookmarked; delete d.answers; await setDoc(doc(db, "consultations", o.id), d); } catch (e) {}
        },
        updateConsultation: async (id, patch) => { try { await updateDoc(doc(db, "consultations", id), patch); } catch (e) {} },
        deleteConsultation: async (id) => { try { await deleteDoc(doc(db, "consultations", id)); } catch (e) {} },
        // 回答はサブコレクション consultations/{cid}/answers に保存（全員に共有）
        addAnswer: async (cid, a) => { try { await addDoc(collection(db, "consultations", cid, "answers"), a); } catch (e) {} }
      };
      async function loadConsultations() {
        try {
          const snap = await getDocs(collection(db, "consultations"));
          const map = {}, list = [];
          snap.forEach((ds) => { const o = ds.data() || {}; o.id = ds.id; o.liked = false; o.bookmarked = false; if (!Array.isArray(o.answers)) o.answers = []; map[ds.id] = o; list.push(o); });
          // 回答をまとめて取得して各相談にひも付け（サブコレクションが正）
          try {
            const asnap = await getDocs(collectionGroup(db, "answers"));
            const byC = {};
            asnap.forEach((ad) => { const cid = ad.ref.parent.parent.id; (byC[cid] = byC[cid] || []).push(Object.assign({}, ad.data())); });
            Object.keys(byC).forEach((cid) => {
              if (!map[cid]) return;
              const arr = byC[cid];
              arr.sort((x, y) => (y.createdAt || 0) - (x.createdAt || 0));
              arr.forEach((a) => { a.you = false; a.marked = false; if (a.helpful == null) a.helpful = 0; });
              map[cid].answers = arr;
            });
          } catch (e) { /* 回答取得に失敗してもインラインのシードで表示 */ }
          if (list.length && window.snOnConsultations) window.snOnConsultations(list);
        } catch (e) { /* 取得失敗時は組み込みのシードのまま */ }
      }
      loadConsultations();

      const allowList = ADMIN_EMAILS.map(e => e.toLowerCase());
      async function isAuthorized(user) {
        if (!user || !user.email) return false;
        const email = user.email.toLowerCase();
        if (allowList.indexOf(email) !== -1) return true;
        // 任意：Firestore の admins/{email} に {allowed:true} があれば許可
        try {
          const snap = await getDoc(doc(db, "admins", email));
          if (snap.exists() && snap.data() && snap.data().allowed) return true;
        } catch (e) { /* Firestore 未設定/権限なしは無視して配列判定のみ */ }
        return false;
      }

      onAuthStateChanged(auth, async (user) => {
        const authorized = user ? await isAuthorized(user) : false;
        const u = user ? { email: user.email, name: user.displayName || "", photo: user.photoURL || "" } : null;
        if (window.snOnAuthChange) window.snOnAuthChange(u, authorized, true);
      });
    } catch (e) {
      if (window.snOnAuthChange) window.snOnAuthChange(null, false, false);
    }
  }
</script>
<script>
// Loading splash: play the animation, then fade out and remove.
(function(){
  var sp = document.getElementById('splash');
  if(!sp) return;
  var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  var MIN = reduce ? 400 : 2000;
  var start = Date.now();
  var done = false;
  function hide(){
    if(done) return; done = true;
    sp.classList.add('sp-hide');
    setTimeout(function(){ if(sp.parentNode) sp.parentNode.removeChild(sp); }, 650);
  }
  window.addEventListener('load', function(){
    setTimeout(hide, Math.max(0, MIN - (Date.now() - start)));
  });
  setTimeout(hide, MIN + 900); // fallback in case 'load' already fired
})();
</script>
